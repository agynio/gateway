openapi: 3.0.3
info:
  title: LLM API
  version: 0.1.0
servers:
  - url: https://api.example.com
tags:
  - name: LLM Providers
  - name: LLM Models
  - name: LLM Responses
paths:
  /providers:
    get:
      tags:
        - LLM Providers
      summary: List LLM providers
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: perPage
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLLMProviders'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags:
        - LLM Providers
      summary: Create LLM provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LLMProviderCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMProvider'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /providers/{id}:
    get:
      tags:
        - LLM Providers
      summary: Get LLM provider by ID
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMProvider'
        default:
          $ref: '#/components/responses/ProblemResponse'
    patch:
      tags:
        - LLM Providers
      summary: Update LLM provider (partial)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LLMProviderUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LLMProvider'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags:
        - LLM Providers
      summary: Delete LLM provider
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: No Content
        default:
          $ref: '#/components/responses/ProblemResponse'
  /models:
    get:
      tags:
        - LLM Models
      summary: List LLM models
      parameters:
        - in: query
          name: providerId
          schema:
            type: string
            format: uuid
          description: Filter by provider ID
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: perPage
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedModels'
        default:
          $ref: '#/components/responses/ProblemResponse'
    post:
      tags:
        - LLM Models
      summary: Create LLM model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'
        default:
          $ref: '#/components/responses/ProblemResponse'
  /models/{id}:
    get:
      tags:
        - LLM Models
      summary: Get LLM model by ID
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'
        default:
          $ref: '#/components/responses/ProblemResponse'
    patch:
      tags:
        - LLM Models
      summary: Update LLM model (partial)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'
        default:
          $ref: '#/components/responses/ProblemResponse'
    delete:
      tags:
        - LLM Models
      summary: Delete LLM model
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: No Content
        default:
          $ref: '#/components/responses/ProblemResponse'
  /responses:
    post:
      tags:
        - LLM Responses
      summary: Proxy LLM response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model_id:
                  type: string
                  format: uuid
              required:
                - model_id
              additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
            text/event-stream:
              schema:
                type: string
        default:
          $ref: '#/components/responses/ProblemResponse'
components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ProblemResponse:
      description: RFC 7807 problem response
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
      required:
        - title
        - status
    EntityMeta:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - createdAt
    AuthMethod:
      type: string
      enum:
        - bearer
    LLMProvider:
      allOf:
        - $ref: '#/components/schemas/EntityMeta'
        - type: object
          properties:
            endpoint:
              type: string
              format: uri
            authMethod:
              $ref: '#/components/schemas/AuthMethod'
          required:
            - endpoint
            - authMethod
    LLMProviderCreateRequest:
      type: object
      properties:
        endpoint:
          type: string
          format: uri
        authMethod:
          $ref: '#/components/schemas/AuthMethod'
        token:
          type: string
      required:
        - endpoint
        - authMethod
        - token
    LLMProviderUpdateRequest:
      type: object
      properties:
        endpoint:
          type: string
          format: uri
        authMethod:
          $ref: '#/components/schemas/AuthMethod'
        token:
          type: string
      additionalProperties: false
    PaginatedLLMProviders:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LLMProvider'
        page:
          type: integer
        perPage:
          type: integer
        total:
          type: integer
      required:
        - items
        - page
        - perPage
        - total
    Model:
      allOf:
        - $ref: '#/components/schemas/EntityMeta'
        - type: object
          properties:
            name:
              type: string
            llmProviderId:
              type: string
              format: uuid
            remoteName:
              type: string
          required:
            - name
            - llmProviderId
            - remoteName
    ModelCreateRequest:
      type: object
      properties:
        name:
          type: string
        llmProviderId:
          type: string
          format: uuid
        remoteName:
          type: string
      required:
        - name
        - llmProviderId
        - remoteName
    ModelUpdateRequest:
      type: object
      properties:
        name:
          type: string
        llmProviderId:
          type: string
          format: uuid
        remoteName:
          type: string
      additionalProperties: false
    PaginatedModels:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Model'
        page:
          type: integer
        perPage:
          type: integer
        total:
          type: integer
      required:
        - items
        - page
        - perPage
        - total
