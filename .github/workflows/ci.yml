name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      GO111MODULE: on
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install toolchain
        run: |
          set -euo pipefail
          npm install --global @redocly/cli @stoplight/spectral-cli
          go install github.com/oasdiff/oasdiff@v1.11.10
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install ORAS
        env:
          ORAS_VERSION: '1.1.0'
        run: |
          curl -fsSL -o oras.tar.gz "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf oras.tar.gz oras
          sudo mv oras /usr/local/bin/oras
          rm oras.tar.gz
          oras version

      - name: Pull OpenAPI spec from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GH_TOKEN}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          bash scripts/pull-spec.sh

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Generate gRPC stubs
        run: buf generate buf.build/agynio/api --path agynio/api/files/v1 --path agynio/api/llm/v1 --path agynio/api/teams/v1

      - name: Spectral lint
        run: spectral lint .openapi/team-v1.yaml

      - name: oasdiff breaking-change gate
        run: |
          set -euo pipefail
          mkdir -p dist
          git fetch origin main --depth=1 || true
          if git rev-parse --verify origin/main >/dev/null 2>&1 \
             && git cat-file -e origin/main:internal/apischema/teamv1/team-v1.yaml 2>/dev/null; then
            git show origin/main:internal/apischema/teamv1/team-v1.yaml > dist/base.yaml
          else
            cp .openapi/team-v1.yaml dist/base.yaml
          fi
          cp .openapi/team-v1.yaml dist/head.yaml
          oasdiff breaking --fail-on ERR dist/base.yaml dist/head.yaml

      - name: Verify generated code
        run: |
          set -euo pipefail
          oapi-codegen --config oapi-codegen.server.yaml .openapi/team-v1.yaml
          gofmt -w internal/gen/server.gen.go
          git diff --exit-code internal/gen/server.gen.go

      - name: Verify embedded spec matches GHCR
        run: |
          set -euo pipefail
          bash scripts/sync-embedded-spec.sh
          git diff --exit-code internal/apischema/teamv1/team-v1.yaml

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build Redoc documentation
        run: |
          set -euo pipefail
          mkdir -p dist
          redocly build-docs .openapi/team-v1.yaml --output dist/redoc.html

      - name: Upload Redoc artifact
        uses: actions/upload-artifact@v4
        with:
          name: redoc-docs
          path: dist/redoc.html
