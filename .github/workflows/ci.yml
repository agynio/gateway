name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install toolchain
        run: |
          set -euo pipefail
          npm install --global @redocly/cli @stoplight/spectral-cli
          go install github.com/oasdiff/oasdiff@v1.11.10
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Spectral lint
        run: spectral lint spec/openapi.yaml

      - name: oasdiff breaking-change gate
        run: |
          set -euo pipefail
          git fetch origin main --depth=1 || true
          BASE_SPEC="$(mktemp)"
          if git rev-parse --verify origin/main >/dev/null 2>&1 && git cat-file -e origin/main:spec/openapi.yaml 2>/dev/null; then
            git show origin/main:spec/openapi.yaml > "$BASE_SPEC"
          else
            cp spec/openapi.yaml "$BASE_SPEC"
          fi
          oasdiff breaking --fail-on ERR "$BASE_SPEC" spec/openapi.yaml

      - name: Verify generated code
        run: |
          set -euo pipefail
          oapi-codegen --config oapi-codegen.server.yaml spec/openapi.yaml
          gofmt -w internal/gen/server.gen.go
          git diff --exit-code internal/gen/server.gen.go

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build Redoc documentation
        run: |
          set -euo pipefail
          mkdir -p dist
          redocly build-docs spec/openapi.yaml --output dist/redoc.html

      - name: Upload Redoc artifact
        uses: actions/upload-artifact@v4
        with:
          name: redoc-docs
          path: dist/redoc.html
